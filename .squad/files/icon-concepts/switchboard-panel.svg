<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="currentColor">
  <!-- SIMPLIFIED: 2x2 jack grid, one plugged -->
  <rect x="2" y="2" width="28" height="28" rx="4" fill="none" stroke="currentColor" stroke-width="2.5"/>
  <!-- 4 jacks only -->
  <circle cx="11" cy="11" r="3.5" fill="none" stroke="currentColor" stroke-width="2"/>
  <circle cx="21" cy="11" r="3.5" fill="none" stroke="currentColor" stroke-width="2"/>
  <circle cx="11" cy="21" r="3.5" fill="none" stroke="currentColor" stroke-width="2"/>
  <!-- Bottom-right is plugged (filled) -->
  <circle cx="21" cy="21" r="3.5"/>
</svg>
