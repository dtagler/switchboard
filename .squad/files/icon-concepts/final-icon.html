<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SwitchBoard Tray Icon — Final</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #121212;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    h1 { font-weight: 300; font-size: 24px; margin-bottom: 8px; }
    .subtitle { color: #0078D4; font-size: 14px; margin-bottom: 32px; font-family: monospace; }
    .variants {
      display: flex;
      gap: 48px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .variant {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .variant-label {
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .preview-tile {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px 28px;
      border-radius: 8px;
    }
    .preview-tile.dark { background: #1f1f1f; border: 1px solid #333; }
    .preview-tile.light { background: #f3f3f3; border: 1px solid #ddd; }
    .icon-size {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .icon-size span {
      font-size: 10px;
      color: #666;
    }
    .preview-tile.light .icon-size span { color: #999; }
    .file-note {
      margin-top: 8px;
      font-size: 11px;
      color: #555;
      font-family: monospace;
    }
  </style>
</head>
<body>

<h1>SwitchBoard Tray Icon — Soft Accent</h1>
<div class="subtitle">#0078D4 keycap stroke • theme-aware glyph</div>

<div class="variants">
  <div class="variant">
    <div class="variant-label">Dark Taskbar (Win11 Default)</div>
    <div class="preview-tile dark">
      <div class="icon-size"><svg width="16" height="16" viewBox="0 0 32 32"><rect x="2" y="2" width="28" height="28" rx="5" fill="none" stroke="#0078D4" stroke-width="3"/><text x="16" y="16" dy=".26em" font-family="'Palatino Linotype',Palatino,serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#ffffff" stroke="#ffffff" stroke-width="0.5" paint-order="stroke fill">§</text></svg><span>16px</span></div>
      <div class="icon-size"><svg width="20" height="20" viewBox="0 0 32 32"><rect x="2" y="2" width="28" height="28" rx="5" fill="none" stroke="#0078D4" stroke-width="3"/><text x="16" y="16" dy=".26em" font-family="'Palatino Linotype',Palatino,serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#ffffff" stroke="#ffffff" stroke-width="0.5" paint-order="stroke fill">§</text></svg><span>20px</span></div>
      <div class="icon-size"><svg width="24" height="24" viewBox="0 0 32 32"><rect x="2" y="2" width="28" height="28" rx="5" fill="none" stroke="#0078D4" stroke-width="3"/><text x="16" y="16" dy=".26em" font-family="'Palatino Linotype',Palatino,serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#ffffff" stroke="#ffffff" stroke-width="0.5" paint-order="stroke fill">§</text></svg><span>24px</span></div>
      <div class="icon-size"><svg width="32" height="32" viewBox="0 0 32 32"><rect x="2" y="2" width="28" height="28" rx="5" fill="none" stroke="#0078D4" stroke-width="3"/><text x="16" y="16" dy=".26em" font-family="'Palatino Linotype',Palatino,serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#ffffff" stroke="#ffffff" stroke-width="0.5" paint-order="stroke fill">§</text></svg><span>32px</span></div>
    </div>
    <div class="file-note">keycap-s-dark.svg</div>
  </div>

  <div class="variant">
    <div class="variant-label">Light Taskbar</div>
    <div class="preview-tile light">
      <div class="icon-size"><svg width="16" height="16" viewBox="0 0 32 32"><rect x="2" y="2" width="28" height="28" rx="5" fill="none" stroke="#0078D4" stroke-width="3"/><text x="16" y="16" dy=".26em" font-family="'Palatino Linotype',Palatino,serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#1f1f1f" stroke="#1f1f1f" stroke-width="0.5" paint-order="stroke fill">§</text></svg><span>16px</span></div>
      <div class="icon-size"><svg width="20" height="20" viewBox="0 0 32 32"><rect x="2" y="2" width="28" height="28" rx="5" fill="none" stroke="#0078D4" stroke-width="3"/><text x="16" y="16" dy=".26em" font-family="'Palatino Linotype',Palatino,serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#1f1f1f" stroke="#1f1f1f" stroke-width="0.5" paint-order="stroke fill">§</text></svg><span>20px</span></div>
      <div class="icon-size"><svg width="24" height="24" viewBox="0 0 32 32"><rect x="2" y="2" width="28" height="28" rx="5" fill="none" stroke="#0078D4" stroke-width="3"/><text x="16" y="16" dy=".26em" font-family="'Palatino Linotype',Palatino,serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#1f1f1f" stroke="#1f1f1f" stroke-width="0.5" paint-order="stroke fill">§</text></svg><span>24px</span></div>
      <div class="icon-size"><svg width="32" height="32" viewBox="0 0 32 32"><rect x="2" y="2" width="28" height="28" rx="5" fill="none" stroke="#0078D4" stroke-width="3"/><text x="16" y="16" dy=".26em" font-family="'Palatino Linotype',Palatino,serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#1f1f1f" stroke="#1f1f1f" stroke-width="0.5" paint-order="stroke fill">§</text></svg><span>32px</span></div>
    </div>
    <div class="file-note">keycap-s-light.svg</div>
  </div>
</div>

</body>
</html>
