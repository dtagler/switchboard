<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle for visual framing -->
  <defs>
    <linearGradient id="toggleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Left keyboard (disabled state - faded) -->
  <g opacity="0.4" transform="translate(8, 32)">
    <!-- Keyboard outline -->
    <rect x="0" y="0" width="40" height="28" rx="2" fill="none" stroke="#666" stroke-width="1.5"/>
    <!-- Key rows (simplified geometric pattern) -->
    <rect x="2" y="2" width="36" height="4" rx="1" fill="#888"/>
    <rect x="2" y="8" width="36" height="4" rx="1" fill="#888"/>
    <rect x="2" y="14" width="36" height="4" rx="1" fill="#888"/>
    <rect x="2" y="20" width="36" height="6" rx="1" fill="#888"/>
  </g>
  
  <!-- Center toggle switch (glowing blue) -->
  <g transform="translate(44, 44)">
    <!-- Toggle background track -->
    <rect x="0" y="6" width="40" height="12" rx="6" fill="#e0e7ff" stroke="#3b82f6" stroke-width="1.5"/>
    <!-- Toggle circle (active position - right) -->
    <circle cx="30" cy="12" r="6.5" fill="url(#toggleGrad)" stroke="#1e40af" stroke-width="1.5"/>
    <!-- Inner highlight on toggle -->
    <circle cx="28" cy="10" r="2" fill="#60a5fa" opacity="0.8"/>
  </g>
  
  <!-- Right keyboard (enabled state - bright) -->
  <g opacity="1" transform="translate(80, 32)">
    <!-- Keyboard outline -->
    <rect x="0" y="0" width="40" height="28" rx="2" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
    <!-- Key rows (simplified geometric pattern) -->
    <rect x="2" y="2" width="36" height="4" rx="1" fill="#3b82f6"/>
    <rect x="2" y="8" width="36" height="4" rx="1" fill="#3b82f6"/>
    <rect x="2" y="14" width="36" height="4" rx="1" fill="#3b82f6"/>
    <rect x="2" y="20" width="36" height="6" rx="1" fill="#3b82f6"/>
  </g>
  
  <!-- Directional arrows (showing the switch action) -->
  <!-- Left arrow (disabled) -->
  <path d="M 25 58 L 30 62 L 27 62" stroke="#999" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Right arrow (enabled) -->
  <path d="M 103 58 L 98 62 L 101 62" stroke="#3b82f6" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- "S" monogram at bottom (for SwitchBoard) -->
  <text x="64" y="102" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle" fill="#1e40af">S</text>
</svg>
